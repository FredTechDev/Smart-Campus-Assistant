version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: smart_campus_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-smart_campus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart_campus_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_campus_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@db:5432/smart_campus}
      FASTAPI_ENV: ${FASTAPI_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - smart_campus_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_campus_frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - smart_campus_network

volumes:
  postgres_data:

networks:
  smart_campus_network:
    driver: bridge
